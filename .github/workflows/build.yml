name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run backend tests
        run: go test ./...

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: go build -o build/bin/pinru .

      - name: Install Apple signing certificate
        if: runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_P12_BASE64 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$GITHUB_RUN_ID}"
          CERT_PATH="$RUNNER_TEMP/pinru-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/pinru-build.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        id: notary
        if: runner.os == 'macOS' && secrets.APPLE_NOTARY_APPLE_ID != '' && secrets.APPLE_NOTARY_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != ''
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials pinru-notary \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_PASSWORD"
          echo "profile=pinru-notary" >> "$GITHUB_OUTPUT"

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: go build -o build/bin/pinru.exe .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ steps.notary.outputs.profile }}
          ARCHIVE_SUFFIX: ${{ matrix.name }}
        run: |
          chmod +x scripts/package_macos_app.sh
          ./scripts/package_macos_app.sh

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/pinru.exe -DestinationPath PINRU-${{ matrix.name }}.zip

      # push to main: 上传到 Actions Artifacts
      - name: Upload artifact
        if: github.event_name == 'push' && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: PINRU-${{ matrix.name }}
          path: dist/PINRU-${{ matrix.name }}.zip
          retention-days: 30

      - name: Upload artifact
        if: github.event_name == 'push' && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PINRU-${{ matrix.name }}
          path: PINRU-${{ matrix.name }}.zip
          retention-days: 30

      # 创建 Release 时: 上传到 Release Assets
      - name: Upload to Release
        if: github.event_name == 'release' && runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PINRU-${{ matrix.name }}.zip

      - name: Upload to Release
        if: github.event_name == 'release' && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: PINRU-${{ matrix.name }}.zip
