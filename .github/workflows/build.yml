name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: go build -o build/bin/pinru .

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: go build -o build/bin/pinru.exe .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: zip -j PINRU-${{ matrix.name }}.zip build/bin/pinru

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/bin/pinru.exe -DestinationPath PINRU-${{ matrix.name }}.zip

      # push to main: 上传到 Actions Artifacts
      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: PINRU-${{ matrix.name }}
          path: PINRU-${{ matrix.name }}.zip
          retention-days: 30

      # 创建 Release 时: 上传到 Release Assets
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: PINRU-${{ matrix.name }}.zip
