name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
          - os: macos-13
            name: macos-amd64
          - os: windows-latest
            name: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.74

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        run: wails3 build

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          if ls *.app 1>/dev/null 2>&1; then
            zip -r ../../PINRU-${{ matrix.name }}.zip *.app
          else
            zip -r ../../PINRU-${{ matrix.name }}.zip *
          fi

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: PINRU-${{ matrix.name }}
          path: PINRU-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PINRU-${{ matrix.name }}
          path: build/bin/
          if-no-files-found: error
          retention-days: 30
